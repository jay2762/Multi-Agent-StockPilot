services:
  - type: web
    name: finance-assistant-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false

  - type: web
    name: finance-assistant-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: BACKEND_HOST
        fromService:
          type: web
          name: finance-assistant-backend
          property: host
      - key: BACKEND_PORT
        fromService:
          type: web
          name: finance-assistant-backend
          property: port
